name: spt-vision-tester
version: 0.3.1
description: Local-only Codex plugin for target-monitor SPT offline visual tests, Computer Use sessions, bounded scenarios, screenshots, logs, and analysis.
included_skill:
  - skills/spt-vision-tester/SKILL.md
scripts:
  - scripts/Start-SptVisionTest.ps1
  - scripts/Stop-SptVisionTest.ps1
  - scripts/Collect-SptVisionArtifacts.ps1
  - scripts/Analyze-SptVisionRun.ps1
  - scripts/Test-SptVisionScenario.ps1
  - scripts/Get-SptVisionMonitors.ps1
  - scripts/Move-SptWindowToTargetMonitor.ps1
scenarios:
  - config/scenarios/boot-to-main-menu.json
  - config/scenarios/launcher-smoke-test.json
  - config/scenarios/manual-raid-movement-test.json
  - config/scenarios/hideout-smoke-test.json
  - config/scenarios/auto-offline-raid-smoke-test.json
  - config/scenarios/auto-offline-raid-no-ai-smoke-test.json
scenario_interface:
  schema: config/scenarios/spt-vision-scenario.schema.json
  example: examples/custom-scenario.example.json
  documentation: docs/CUSTOM_SCENARIOS.md
  version: 1
multi_monitor:
  documentation: docs/MULTI_MONITOR.md
  monitor_diagnostics: scripts/Get-SptVisionMonitors.ps1
  window_positioning: scripts/Move-SptWindowToTargetMonitor.ps1
  input_isolation: false
python_tool:
  package: tools/spt_vision_tester
  entrypoint: python -m spt_vision_tester.main
  requirements: tools/requirements.txt
safety_notes:
  - Only use with configured local SPT offline installations.
  - Never launch official online EFT or Battlestate Launcher.
  - Never interact with login, payment, account, browser, online matchmaking, flea market, or trade screens.
  - Never modify original game files.
  - Never delete profiles, saves, configs, cache, logs, or mods.
  - All paths must come from config.
  - Keyboard and mouse input require explicit config permission, action limits, duration limits, screenshots, and emergency stop.
  - Raid automation is disabled unless AllowRaidAutomation=true; prefer manual raid entry.
  - Custom scenarios accept only the documented action allowlist and are validated before launch.
  - Scenario JSON cannot execute shell commands, arbitrary paths, text entry, or clipboard operations.
  - Treat third-party scenarios as untrusted and review every coordinate and key before running.
  - Monitor binding constrains SPT window placement but does not isolate Windows keyboard focus or mouse input.
  - Cooperative desktop mode defers interrupted focus-only handoffs but stops on interference during clicks, keys, or movement; it cannot guarantee simultaneous input safety.
  - Use a VM, separate interactive Windows session, or another machine for true concurrent desktop control.
  - Stop only PIDs recorded by this plugin.
required_permissions:
  - Local filesystem read/write for artifacts under configured ArtifactsRoot.
  - Local process launch for configured SPT executables under SptRoot.
  - Foreground window screenshot access.
  - Optional foreground keyboard/mouse control only after explicit permission.
  - Local network check of configured ServerUrl.
